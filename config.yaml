# mol configuration (YAML)
# Override with MOL_CONFIG env or -config flag if needed.

service_name: "mol"
# Fallback when no physical NIC broadcast addrs are found (물리 NIC brd 자동 수집 시 사용 안 함):
# discovery_broadcast_address: "172.29.236.255"
# discovery_broadcast_addresses:  # 주석: 물리 NIC의 brd 주소를 자동 수집하여 discovery에 사용
#   - "172.29.237.255"
discovery_udp_port: 9999
http_port: 8888
web_prefix: "/web"
api_prefix: "/api/v1"
discovery_timeout_seconds: 10
discovery_deduplicate: true
version: "0.4.0"   # leave empty to use build ldflags; set e.g. "1.2.3" to override
# systemctl_service_name: "mol.service"   # for service-status API (self + discovered hosts)
# deploy_base: "/opt/mol"   # base for staging/, update.sh
# install_prefix: "/opt/mol"   # mol 설치 경로 prefix (versions 목록·삭제, installer). 비면 deploy_base 사용
# ssh_port: 22   # SSH port for remote service start/stop (default 22)
# ssh_user: "root"   # SSH user for remote start/stop (default "root")